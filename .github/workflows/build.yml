name: Build add-on images

# Builds multi-arch Docker images and pushes them to GHCR so that
# Home Assistant can pull pre-built images instead of building locally.

on:
  push:
    branches: [main]
    paths:
      - "openclaw/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get add-on version
        id: addon
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          config_text = Path("openclaw/config.yaml").read_text(encoding="utf-8")
          match = re.search(r'^version:\s*"([^"]+)"', config_text, re.MULTILINE)
          if not match:
              raise SystemExit("Unable to parse version from openclaw/config.yaml")

          Path(os.environ["GITHUB_OUTPUT"]).write_text(
              f"version={match.group(1)}\n",
              encoding="utf-8",
          )
          PY

      - name: Get pinned OpenClaw version
        id: openclaw
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          build_text = Path("openclaw/build.yaml").read_text(encoding="utf-8")
          match = re.search(r'^\s*OPENCLAW_VERSION:\s*"([^"]+)"', build_text, re.MULTILINE)
          if not match:
              raise SystemExit("Unable to parse OPENCLAW_VERSION from openclaw/build.yaml")

          Path(os.environ["GITHUB_OUTPUT"]).write_text(
              f"version={match.group(1)}\n",
              encoding="utf-8",
          )
          PY

      - name: Validate pinned versions
        run: |
          if [ "${{ steps.addon.outputs.version }}" != "${{ steps.openclaw.outputs.version }}" ]; then
            echo "config.yaml version (${{ steps.addon.outputs.version }}) does not match build.yaml OPENCLAW_VERSION (${{ steps.openclaw.outputs.version }})" >&2
            exit 1
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: openclaw
          file: openclaw/Dockerfile
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:latest
            BUILD_VERSION=${{ steps.addon.outputs.version }}
            BUILD_ARCH=${{ matrix.arch }}
            OPENCLAW_VERSION=${{ steps.openclaw.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-addon-openclaw:${{ steps.addon.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-addon-openclaw:latest
