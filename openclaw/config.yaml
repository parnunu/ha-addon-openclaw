name: OpenClaw
version: "2026.4.10-5"
slug: openclaw
description: >-
  Run the OpenClaw AI gateway on your Home Assistant instance.
  Connect any AI channel (WhatsApp, Telegram, Discord, Slack, and more)
  to your own LLM — all from your own hardware.
url: https://github.com/parnunu/ha-addon-openclaw
image: ghcr.io/parnunu/{arch}-addon-openclaw
arch:
  - amd64
  - aarch64
ports:
  "18789/tcp": 18789
ports_description:
  "18789/tcp": "OpenClaw Gateway (HTTP/WebSocket)"
map:
  - data:rw
startup: application
init: false
hassio_api: true
hassio_role: default
options:
  gateway_token: ""
  log_level: "info"
  allowed_origins: []
schema:
  gateway_token: str
  log_level: list(debug|info|warning|error)
  allowed_origins:
    - str
